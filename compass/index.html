<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Compass — NOBA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet">
<style>
:root{--teal:#2B3F47;--dark-teal:#1E2D33;--copper:#B07D4B;--sage:#9EA67C;--cream:#F5F0E8;--lt:#3A5560;--mid:#8A9AA0;--white:#FFF}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--dark-teal);color:var(--cream);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.hdr{padding:16px 20px 12px;border-bottom:2px solid var(--copper);background:var(--teal);flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--cream)}
.hdr .sub{font-size:11px;color:var(--copper);font-style:italic;margin-top:2px}
.btn-exp{background:var(--copper);border:none;color:var(--cream);padding:8px 16px;border-radius:3px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer}
.btn-exp:hover{opacity:.85}
.meta-row{display:flex;gap:12px;margin-top:10px}
.mi{flex:1;background:transparent;border:none;border-bottom:1px solid var(--copper);color:var(--cream);font-size:13px;font-family:'Playfair Display',serif;padding:4px 0;outline:none}
.mi::placeholder{color:var(--mid)}
input[type=date].mi{width:130px;flex:none}
.pb{margin-top:10px}.pbr{height:3px;background:var(--lt);border-radius:2px;overflow:hidden}
.pbf{height:100%;background:var(--copper);transition:width .3s;border-radius:2px}
.pbl{font-size:10px;color:var(--mid);margin-top:3px}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--teal);border-bottom:1px solid var(--lt);padding:0 4px;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tb{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mid);padding:10px 12px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.a{background:var(--dark-teal);border-bottom-color:var(--copper);color:var(--copper);font-weight:700}
.ct{flex:1;overflow-y:auto;padding:16px 16px 60px;-webkit-overflow-scrolling:touch}
.st{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--cream);margin-bottom:4px}
.sr{width:40px;height:2px;background:var(--copper);margin-bottom:6px}
.sh{font-size:12px;color:var(--mid);font-style:italic;margin-bottom:16px;line-height:1.4}
.tip{background:var(--teal);border-left:3px solid var(--copper);padding:10px 14px;margin-bottom:16px;border-radius:0 4px 4px 0;font-size:12px;color:var(--cream);line-height:1.5}
.tip strong{color:var(--copper)}
.tip em{color:var(--sage);font-style:normal}
.cd{margin-bottom:14px;background:var(--lt);border-radius:4px;padding:14px 16px;border-left:3px solid var(--copper)}
.cd.sg{border-left-color:var(--sage)}
.cl{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--copper);margin-bottom:2px}
.cd.sg .cl{color:var(--sage)}
.ch{font-size:11px;color:var(--mid);font-style:italic;margin-bottom:10px;line-height:1.4}
.cn{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--copper);margin-right:8px}
.cd.sg .cn{color:var(--sage)}
.chr{display:flex;align-items:baseline;margin-bottom:2px}
textarea,.ti{width:100%;background:var(--dark-teal);border:1px solid var(--lt);border-radius:3px;color:var(--cream);font-size:14px;font-family:'Playfair Display',serif;padding:10px 12px;outline:none;line-height:1.5;transition:border-color .2s;resize:vertical}
textarea:focus,.ti:focus{border-color:var(--copper)}
.ti{resize:none}.ti::placeholder{color:var(--mid)}
.gni{background:transparent;border:none;border-bottom:1px solid var(--sage);color:var(--cream);font-size:14px;font-weight:700;font-family:'Playfair Display',serif;padding:2px 0;outline:none;flex:1}
.gni::placeholder{color:var(--mid);font-weight:400}
.rtr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rn{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--copper);min-width:24px}
.msr{display:flex;gap:8px;align-items:center;margin-left:34px;margin-bottom:6px}
.msa{color:var(--sage);font-size:12px;flex-shrink:0}
.mst{flex:1;background:var(--dark-teal);border:1px solid var(--lt);border-radius:3px;color:var(--cream);font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 10px;outline:none}
.mst:focus{border-color:var(--sage)}
.msd{background:var(--dark-teal);border:1px solid var(--lt);border-radius:3px;color:var(--copper);font-size:11px;font-family:'DM Sans',sans-serif;padding:6px 8px;outline:none;width:120px;flex-shrink:0}
.msrm{background:transparent;border:none;color:var(--mid);font-size:16px;cursor:pointer;padding:0 4px}
.amb{background:transparent;border:1px dashed var(--sage);color:var(--sage);padding:4px 12px;border-radius:3px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-left:34px;margin-top:4px}
.nr{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.nb{background:transparent;border:1px solid var(--mid);color:var(--mid);padding:10px 20px;border-radius:3px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.nn{background:var(--copper);border:none;color:var(--cream);padding:10px 24px;border-radius:3px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.ml{background:var(--teal);border-radius:8px;padding:24px;max-width:360px;width:100%;border:1px solid var(--copper)}
.ml h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--cream);margin-bottom:8px}
.ml p{font-size:12px;color:var(--mid);margin-bottom:20px;line-height:1.5}
.mp{width:100%;background:var(--copper);border:none;color:var(--cream);padding:12px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:'DM Sans',sans-serif}
.mc{width:100%;background:transparent;border:1px solid var(--mid);color:var(--mid);padding:10px;border-radius:4px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.hd{display:none}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-top"><div><h1>The Compass</h1><div class="sub">Individual Vision / Traction Organizer</div></div>
<button class="btn-exp" onclick="showM()">Export ↓</button></div>
<div class="meta-row"><input class="mi" id="uN" placeholder="Your name" oninput="sv()">
<input type="date" class="mi" id="uD" oninput="sv()"></div>
<div class="pb"><div class="pbr"><div class="pbf" id="pf"></div></div><div class="pbl" id="pl">0%</div></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="ct" id="ct"></div>
<div class="mo hd" id="mO" onclick="hideM()"><div class="ml" onclick="event.stopPropagation()">
<h3>Export Your Compass</h3>
<p>Opens your Compass as a print-ready document. In the dialog that appears, choose <strong style="color:#B07D4B">Save as PDF</strong> to download.</p>
<button class="mp" onclick="expD()">Export as PDF</button>
<button class="mc" onclick="hideM()">Cancel</button>
</div></div>

const TIPS={
vision:`<strong>Think bigger than you're comfortable with.</strong> Where will you be in 10 years? Not where you hope — where you <em>will</em> be. This isn't a wish list. It's a declaration. Write it like it's already decided. One clear sentence. If it doesn't make you a little nervous, you're not aiming high enough.`,
threeYear:`<strong>Three years is close enough to be real.</strong> Don't write goals — write a picture. What does your life actually look like? Be specific. What does your body feel like? What's in your bank account? Who are you spending time with? If you can see it clearly, you can build toward it.`,
oneYear:`<strong>The One Thing comes first.</strong> This is the single domino that, if you knock it over, starts a chain reaction across everything else. The test: if you accomplish it and nothing else changes downstream, it's just a goal. If three other problems start solving themselves, you found it. <em>Goals 2–4 are non-negotiable.</em> Goals 5–7 are yours to define.`,
rocks:`<strong>Rocks are not to-do items.</strong> They're the 3–7 things that <em>must</em> get done in the next 90 days. Write each one as a completable outcome with a clear done/not-done line. Add milestones to keep yourself honest — each one is a checkpoint with a date. If a rock doesn't have milestones, it's a wish, not a plan.`
};

const FLD={
foundation:[{id:"purpose",l:"Purpose",h:"What drives you? The reason you get out of bed every morning."},{id:"tribe",l:"Tribe",h:"Who sharpens you and holds you accountable?"}],
vision:[{id:"tenYear",l:"10-Year Target",h:"One bold, clear statement of where you will be in 10 years."}],
threeYear:[{id:"threeHealth",l:"Health",h:"What does your health look like in 3 years?"},{id:"threeFinance",l:"Finance",h:"What does your financial life look like in 3 years?"},{id:"threeRelationship",l:"Relationship / Spiritual",h:"What do your relationships and spiritual life look like in 3 years?"}]
};

const FG=[
{id:"oneThingYear",l:"The One Thing",h:"What is the ONE thing such that by doing it, everything else becomes easier or unnecessary?",n:1},
{id:"yearHealth",l:"Health",h:"What does your body, mind, and energy need this year?",n:2},
{id:"yearFinance",l:"Finance",h:"What is your key financial target this year?",n:3},
{id:"yearRelationship",l:"Relationship / Spiritual",h:"What commitment matters most this year?",n:4}
];
const OG=[{id:"yearGoal5",n:5},{id:"yearGoal6",n:6},{id:"yearGoal7",n:7}];

let S={f:{},gl:{},rocks:Array.from({length:7},()=>({text:"",milestones:[{text:"",date:""}]}))};
let ag="foundation";

function ld(){try{const r=localStorage.getItem("compass-v4");if(r){const p=JSON.parse(r);S.f=p.f||{};S.gl=p.gl||{};if(p.rocks)S.rocks=p.rocks;if(p.name)document.getElementById("uN").value=p.name;if(p.date)document.getElementById("uD").value=p.date}}catch(e){}}

let st;function sv(){clearTimeout(st);st=setTimeout(()=>{try{localStorage.setItem("compass-v4",JSON.stringify({f:S.f,gl:S.gl,rocks:S.rocks,name:document.getElementById("uN").value,date:document.getElementById("uD").value}))}catch(e){}up()},300)}

function up(){const ids=["purpose","tribe","tenYear","threeHealth","threeFinance","threeRelationship","oneThingYear","yearHealth","yearFinance","yearRelationship","yearGoal5","yearGoal6","yearGoal7"];
let c=ids.filter(i=>S.f[i]?.trim()).length+S.rocks.filter(r=>r.text?.trim()).length;
const pct=Math.round(c/(ids.length+7)*100);
document.getElementById("pf").style.width=pct+"%";
document.getElementById("pl").textContent=pct+"% complete"}

function rT(){document.getElementById("tabs").innerHTML=G.map(g=>`<button class="tb ${ag===g.id?'a':''}" onclick="sw('${g.id}')"><span style="margin-right:3px">${g.i}</span>${g.t}</button>`).join("")}

function sw(id){ag=id;rT();rC();document.getElementById("ct").scrollTop=0}
function gf(id){return S.f[id]||""}
function sf(id,v){S.f[id]=v;sv()}
function e(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function eh(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

function rC(){
const el=document.getElementById("ct");
const g=G.find(x=>x.id===ag);
let h=`<div class="st">${g.t}</div><div class="sr"></div>`;

// Coaching tip
if(TIPS[ag])h+=`<div class="tip">${TIPS[ag]}</div>`;
if(ag==="vision")h+=`<div class="sh">Paint the clearest picture you can of where you want to be in 10 years. Be bold — this is your north star, not a guarantee.</div>`;

if(FLD[ag]){
if(ag==="threeYear")h+=`<div class="sh">What does your life look like three years from now?</div>`;
if(ag==="foundation"){
const foundationTips={purpose:"What drives you? Your purpose is your <em>why</em> — the reason you get out of bed and do the hard things.",tribe:"Who are your people? Name the community, brotherhood, or circle you're building toward and fighting for."};
FLD[ag].forEach(f=>{h+=`<div class="tip">${foundationTips[f.id]}</div><div class="cd"><div class="cl">${f.l}</div><div class="ch">${f.h}</div><textarea rows="3" oninput="sf('${f.id}',this.value)">${e(gf(f.id))}</textarea></div>`});
}else{
FLD[ag].forEach(f=>{h+=`<div class="cd"><div class="cl">${f.l}</div><div class="ch">${f.h}</div><textarea rows="3" oninput="sf('${f.id}',this.value)">${e(gf(f.id))}</textarea></div>`})}}

if(ag==="oneYear"){
h+=`<div class="sh">What must be true 12 months from now?</div>`;
FG.forEach(g=>{h+=`<div class="cd"><div class="chr"><span class="cn">${g.n}.</span><span class="cl">${g.l}</span></div><div class="ch">${g.h}</div><textarea rows="2" oninput="sf('${g.id}',this.value)">${e(gf(g.id))}</textarea></div>`});
OG.forEach(g=>{const lb=S.gl[g.id]||"";h+=`<div class="cd sg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="cn">${g.n}.</span><input class="gni" value="${e(lb)}" placeholder="Name this goal..." oninput="S.gl['${g.id}']=this.value;sv()"></div><textarea rows="2" placeholder="Describe your goal..." oninput="sf('${g.id}',this.value)">${e(gf(g.id))}</textarea></div>`})}

if(ag==="rocks"){
h+=`<div class="sh">3–7 priorities for the next 90 days. Done or not done.</div>`;
S.rocks.forEach((r,ri)=>{
h+=`<div class="cd"><div class="rtr"><span class="rn">${ri+1}</span><input class="ti" value="${e(r.text)}" placeholder="Rock ${ri+1} — what must get done?" oninput="S.rocks[${ri}].text=this.value;sv()"></div>`;
r.milestones.forEach((m,mi)=>{
h+=`<div class="msr"><span class="msa">↳</span><input class="mst" value="${e(m.text)}" placeholder="Milestone..." oninput="S.rocks[${ri}].milestones[${mi}].text=this.value;sv()"><input type="date" class="msd" value="${m.date}" oninput="S.rocks[${ri}].milestones[${mi}].date=this.value;sv()">${r.milestones.length>1?`<button class="msrm" onclick="rmMs(${ri},${mi})">×</button>`:''}</div>`});
h+=`<button class="amb" onclick="aMs(${ri})">+ Add milestone</button></div>`})}

const gi=G.findIndex(x=>x.id===ag);
h+=`<div class="nr">`;
h+=gi>0?`<button class="nb" onclick="sw('${G[gi-1].id}')">← Back</button>`:`<div></div>`;
h+=gi<G.length-1?`<button class="nn" onclick="sw('${G[gi+1].id}')">Next →</button>`:`<button class="nn" onclick="showM()">Export Document ↓</button>`;
h+=`</div>`;
el.innerHTML=h}

function aMs(ri){S.rocks[ri].milestones.push({text:"",date:""});sv();rC()}
function rmMs(ri,mi){S.rocks[ri].milestones.splice(mi,1);if(!S.rocks[ri].milestones.length)S.rocks[ri].milestones=[{text:"",date:""}];sv();rC()}
function showM(){document.getElementById("mO").classList.remove("hd")}
function hideM(){document.getElementById("mO").classList.add("hd")}
function fd(d){if(!d)return"";try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}catch(e){return d}}

function expD(){
const nm=document.getElementById("uN").value;
const dt=document.getElementById("uD").value;
const f=id=>eh((S.f&&S.f[id])||"");

const goalsH=[...FG,...OG].map(g=>{
const lb=g.l||(S.gl&&S.gl[g.id])||`Goal ${g.n}`;
const v=f(g.id);
const ac=g.n<=4?"#2B3F47":"#9EA67C";
return `<div class="goal"><span class="goal-n">${g.n}.</span><span class="goal-l" style="color:${ac};">${e(lb)}${v?':':''}</span><span class="goal-v">${v||'<span class="empty">—</span>'}</span></div>`}).join("");

const rocksH=(S.rocks&&S.rocks.length?S.rocks:[]).map((r,i)=>{
if(!r||!r.text?.trim())return"";
const ms=(r.milestones&&r.milestones.length?r.milestones:[]).filter(m=>m&&m.text?.trim()).map(m=>
`<div class="rock-ms"><span>↳</span> ${e(m.text)}${m.date?` <span style="color:#B07D4B;">— ${fd(m.date)}</span>`:""}</div>`).join("");
return `<div class="rock"><div class="rock-t"><span class="rock-n">${i+1}.</span><span>${e(r.text)}</span></div>${ms}</div>`}).join("")||'<span class="empty">—</span>';
